<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Mesas de Poker</title>
</head>
<body>
  <!-- Contenedor principal de la aplicación -->
  <div id="app">
    <h1>Panel de Administración - Mesa 1</h1>
    <div class="poker-table-container">
      <div class="poker-table"><!-- La mesa se renderiza por JS --></div>
    </div>
  </div>

  <!-- Panel lateral como UNA sola tarjeta (estilo iOS) -->
  <aside id="side-panel" class="side-panel side-panel--glass">
    <div class="panel-content">

      <!-- Estado: icon toggle horizontal -->
      <section class="panel-section" id="status-section">
        <h3>Estado de la Mesa</h3>
        <div id="state-icons" class="state-icons" role="group" aria-label="Estado de mesa">
          <button class="state-btn active" data-state="activa" title="Iniciar / Continuar">
            <!-- lucide: play -->
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="state-btn" data-state="en espera" title="Pausar">
            <!-- lucide: pause -->
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="state-btn" data-state="inactiva" title="Detener">
            <!-- lucide: square -->
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12"/></svg>
          </button>
        </div>
      </section>

      <!-- Tiempo de Sesión -->
      <section class="panel-section">
        <h3>Tiempo de Sesión</h3>
        <div id="session-timer" class="timer">00:00:00</div>
        <div id="created-at-text" class="created-at-text"></div>
      </section>

      <!-- Lista de espera -->
      <section class="panel-section" id="waiting-list-section">
        <h3>Lista de Espera</h3>
        <ul id="waiting-list" class="waiting-list waiting-list--tall"></ul>

        <!-- Formulario oculto; se muestra al pulsar el icono de añadir -->
        <div id="add-player-form" class="add-player-form hidden">
          <input type="text" id="player-name-input" placeholder="Nombre del jugador…" />
          <button id="confirm-add-player-btn">Añadir</button>
        </div>
      </section>

      <!-- Acciones compactas tipo toolbar -->
      <section class="panel-section">
        <div class="panel-actions">
          <button id="wl-add-btn" class="icon-btn sm" title="Añadir jugador">
            <!-- lucide: user-round-plus -->
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 21a8 8 0 1 0-12 0"/><circle cx="12" cy="8" r="4"/>
              <path d="M19 8v6"/><path d="M22 11h-6"/>
            </svg>
          </button>

          <button id="export-csv-btn" class="icon-btn sm" title="Exportar sesión CSV">
            <!-- lucide: file-text -->
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>
              <path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>
            </svg>
          </button>
        </div>
      </section>

    </div>
  </aside>

  <!-- Botón flotante para abrir/cerrar el panel -->
  <button id="panel-fab" class="panel-fab" aria-label="Abrir panel">
    <!-- lucide: panel-right-open (aprox) -->
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="15" y1="3" x2="15" y2="21"></line>
      <polyline points="10 10 12 12 10 14"></polyline>
    </svg>
  </button>

  <!-- Modal para Sentar Jugador -->
  <div id="seat-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="seat-modal-close" class="close-button" aria-label="Cerrar">&times;</button>
      <h2 id="modal-title">Sentar Jugador</h2>

      <div class="seat-info">
        <p><strong>Asiento:</strong> <span id="modal-seat-id"></span></p>
        <p><strong>Estado:</strong> <span id="modal-seat-status"></span></p>
      </div>

      <form id="form-seat-available">
        <label for="player-name">Nombre del Jugador:</label>
        <input type="text" id="player-name" name="player-name" required>

        <label for="seat-select">Asignar al Asiento:</label>
        <select id="seat-select" name="seat-select" required>
          <option value="seat_1">Asiento 1</option>
          <option value="seat_2">Asiento 2</option>
          <option value="seat_3">Asiento 3</option>
          <option value="seat_4">Asiento 4</option>
          <option value="seat_5">Asiento 5</option>
          <option value="seat_6">Asiento 6</option>
          <option value="seat_7">Asiento 7</option>
          <option value="seat_8">Asiento 8</option>
          <option value="seat_9">Asiento 9</option>
        </select>

        <label for="buy-in">Buy-in Inicial ($):</label>
        <input type="number" id="buy-in" name="buy-in" required>

        <label for="avatar-search-input">Buscar Avatar por Nombre:</label>
        <div class="avatar-search-container">
          <input type="text" id="avatar-search-input" name="avatar-search" autocomplete="off">
          <div id="avatar-preview"></div>
        </div>

        <button id="seat-modal-confirm" type="submit">Sentar Jugador</button>
      </form>
    </div>
  </div>

  <!-- Modal para Croupier -->
  <div id="dealer-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="close-dealer-modal" class="close-button" aria-label="Cerrar">&times;</button>
      <h2>Seleccionar Croupier</h2>
      <div id="dealer-gallery" class="gallery"></div>
    </div>
  </div>

  <!-- Modal Ficha de Jugador -->
  <div id="player-card-modal" class="modal-overlay hidden">
    <div class="player-card">
      <div class="player-card-header">
        <img id="card-player-avatar" src="/avatars/default.png" alt="Avatar del jugador">
        <h2 id="card-player-name">Nombre del Jugador</h2>
      </div>

<div class="player-card-body">
  <div class="pc-stats">
    <div class="pc-row">
      <span class="pc-label">Ingreso:</span>
      <span id="card-total-amount" class="pc-value pc-money">0</span>
    </div>
    <div class="pc-row">
      <span class="pc-label">Compras:</span>
      <span id="card-purchases-count" class="pc-value">0</span>
    </div>
    <div class="pc-row">
      <span class="pc-label">Tiempo de Sesión:</span>
      <span id="card-player-session-live" class="pc-value">00:00:00</span>
    </div>
    <div class="pc-row" id="pc-row-accumulated">
      <span class="pc-label">Acumulado:</span>
      <span id="card-player-session-total" class="pc-value">00:00:00</span>
    </div>
  </div>
</div>


      <div class="player-card-actions">
        <div class="action-group">
          <input type="number" id="card-rebuy-amount" name="card-rebuy-amount" placeholder="Monto Rebuy...">
          <button id="card-btn-rebuy">Añadir Fichas</button>
        </div>
        <button id="card-btn-cashout" class="danger" disabled>Hacer Cash Out</button>
        <button id="card-btn-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
