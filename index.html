<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/branding/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050508" />
  <link rel="apple-touch-icon" href="/branding/favicon.png" />
  <title>Experience Poker Room</title>
  <style>
    /* Estilo de emergencia para evitar parpadeos blancos o de texto raw */
    body { 
      background-color: #050508; 
      margin: 0; 
      padding: 0;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    /* --- SPLASH SCREEN --- */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #050508;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
    }
    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-ambient {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.08), transparent 70%);
      animation: ambientPulse 4s ease-in-out infinite;
    }

    .splash-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .splash-logo-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(212,175,55,0.2));
      animation: logoBreathe 3s ease-in-out infinite;
    }

    /* Cartas Flotantes */
    .splash-card {
      position: absolute;
      width: 50px;
      height: 70px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    .card-1 { top: -20px; left: -40px; transform: rotate(-15deg); animation: floatCard 4s ease-in-out infinite; }
    .card-2 { top: -30px; right: -30px; transform: rotate(20deg); animation: floatCard 4s ease-in-out infinite 1s; }
    .card-3 { bottom: 0; left: -50px; transform: rotate(-10deg); animation: floatCard 4s ease-in-out infinite 2s; }
    .card-4 { bottom: -20px; right: -40px; transform: rotate(15deg); animation: floatCard 4s ease-in-out infinite 1.5s; }

    .splash-loader-wrap {
      width: 200px;
      text-align: center;
    }
    .splash-loader-bar {
      height: 2px;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative;
    }
    .splash-loader-progress {
      position: absolute;
      left: 0; top: 0; height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      animation: loaderLine 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .splash-text {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: rgba(212,175,55,0.6);
      font-weight: 600;
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes logoBreathe {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(212,175,55,0.1)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(212,175,55,0.3)); }
    }
    @keyframes floatCard {
      0%, 100% { transform: translateY(0) rotate(var(--rot)); }
      50% { transform: translateY(-15px) rotate(calc(var(--rot) + 5deg)); }
    }
    @keyframes loaderLine {
      0% { left: -100%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <!-- Pantalla de Carga Premium -->
  <div id="splash-screen">
    <div class="splash-ambient"></div>
    <div class="splash-content">
      <div class="splash-logo-wrap">
        <div class="splash-card card-1" style="--rot: -15deg">♠</div>
        <div class="splash-card card-2" style="--rot: 20deg; color: #ff453a">♥</div>
        <div class="splash-card card-3" style="--rot: -10deg; color: #ff453a">♦</div>
        <div class="splash-card card-4" style="--rot: 15deg">♣</div>
        <img src="/branding/logo.png" class="splash-logo" alt="Logo">
      </div>
      <div class="splash-loader-wrap">
        <div class="splash-loader-bar">
          <div class="splash-loader-progress"></div>
        </div>
        <div class="splash-text">Preparando la mesa</div>
      </div>
    </div>
  </div>

  <div id="app"></div>
  <div id="modal-root"></div>

  <script type="module" src="/src/main.js"></script>

  <!-- Filtro Liquid Glass -->
  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;pointer-events:none">
    <defs>
      <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
        <feDisplacementMap in="SourceGraphic" in2="blurred" scale="68" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>
</body>
</html>
